name: Handle control-panel feedback

# When control_panel/feedback.md is edited, read the notes written on the
# "Your note:" lines and turn them into a draft pull request.
#
# SETUP (one time): add a repository secret named  ANTHROPIC_API_KEY
#   (Settings → Secrets and variables → Actions → New repository secret).
# Without that secret, this workflow just lists the notes in the run
# summary and stops — it can't apply them automatically.

on:
  push:
    paths:
      - "control_panel/feedback.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: feedback-${{ github.ref }}
  cancel-in-progress: false

jobs:
  feedback:
    # Don't loop on the automation's own clearing commit.
    if: ${{ !contains(github.event.head_commit.message, '[skip-feedback]') }}
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - id: scan
        name: Look for written notes
        run: node .github/scripts/scan-feedback.js

      - name: API key missing
        if: ${{ steps.scan.outputs.has_notes == 'true' && env.HAS_KEY != 'true' }}
        run: echo "::warning::Notes were found, but no ANTHROPIC_API_KEY secret is set, so they can't be applied automatically. Add it under Settings → Secrets and variables → Actions."

      - name: Apply the notes with Claude
        if: ${{ steps.scan.outputs.has_notes == 'true' && env.HAS_KEY == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 40"
          # If you're pinned to the older beta action, rename "prompt" to "direct_prompt".
          prompt: |
            The site owner left change requests in control_panel/feedback.md, on the
            "Your note:" lines and under "Anything else". Text in italics inside
            parentheses is a placeholder hint — ignore it.

            For each real note:
            - Make the change. Prefer editing the files in control_panel/
              (settings.md, appearance.md, words.md, cards.md), since the site reads
              those at runtime. Only touch the code (index.html, styles.css,
              script.js) if a note truly requires it.
            - Match the existing gentle, plain-language style in anything you edit.

            REQUIRED — rewrite the feedback document as part of this same update:
            - Reset every "Your note:" line in control_panel/feedback.md back to a
              blank "> Your note:" and clear the "Anything else" answer area, so the
              next round starts fresh. Keep all the explanatory text, hints, and
              headings exactly as they were.

            Then:
            - Open a DRAFT pull request (do not push to the default branch directly)
              titled "Apply control-panel feedback", describing what you changed for
              each note. End the PR body with the line: [skip-feedback]
            - If a note is unclear or can't be done safely, leave that note in place
              (don't blank it) and explain why in the PR description.
